<svg width="280" height="240" viewBox="0 0 280 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background elements -->
  <rect x="0" y="0" width="280" height="240" rx="24" fill="#FFF2EA"/>
  <circle cx="240" cy="40" r="25" fill="#FF725E" opacity="0.15"/>
  <rect x="20" y="210" width="240" height="10" rx="5" fill="#F6F6F6"/>

  <!-- ShopEase Logo -->
  <g transform="translate(80, 20)">
    <rect x="0" y="0" width="120" height="40" rx="12" fill="#fff"/>
    <rect x="12" y="12" width="18" height="12" rx="3" fill="#FF725E"/>
    <circle cx="16" cy="28" r="2.5" fill="#222"/>
    <circle cx="26" cy="28" r="2.5" fill="#222"/>
    <rect x="18" y="8" width="2" height="8" rx="1" fill="#FF725E"/>
    <rect x="22" y="8" width="2" height="8" rx="1" fill="#FF725E"/>
    <text x="38" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FF725E">Shop</text>
    <text x="80" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#222">Ease</text>
  </g>

  <!-- Woman -->
  <g transform="translate(50, 100)">
    <ellipse cx="20" cy="20" rx="18" ry="18" fill="#FFB085"/>
    <rect x="12" y="38" width="16" height="38" rx="7" fill="#FFB085"/>
    <rect x="6" y="76" width="28" height="10" rx="5" fill="#FF725E"/>
    <rect x="2" y="50" width="12" height="24" rx="4" fill="#00E0C6"/>
    <rect x="26" y="50" width="12" height="24" rx="4" fill="#3B82F6"/>
    <rect x="10" y="70" width="8" height="18" rx="3" fill="#FF725E"/>
    <!-- Shopping bag (woman) -->
    <rect x="30" y="70" width="16" height="18" rx="4" fill="#fff" stroke="#FF725E" strokeWidth="2"/>
    <rect x="34" y="88" width="8" height="8" rx="2" fill="#FF725E"/>
    <!-- Smile (woman) -->
    <path d="M24 28 Q28 32 32 28" stroke="#222" strokeWidth="2" fill="none"/>
  </g>

  <!-- Man -->
  <g transform="translate(150, 100)">
    <ellipse cx="20" cy="20" rx="18" ry="18" fill="#FFB085"/>
    <rect x="12" y="38" width="16" height="38" rx="7" fill="#FFB085"/>
    <rect x="6" y="76" width="28" height="10" rx="5" fill="#3B82F6"/>
    <rect x="2" y="50" width="12" height="24" rx="4" fill="#FF725E"/>
    <rect x="26" y="50" width="12" height="24" rx="4" fill="#00E0C6"/>
    <rect x="10" y="70" width="8" height="18" rx="3" fill="#3B82F6"/>
    <!-- Shopping bag (man) -->
    <rect x="30" y="70" width="16" height="18" rx="4" fill="#fff" stroke="#3B82F6" strokeWidth="2"/>
    <rect x="34" y="88" width="8" height="8" rx="2" fill="#3B82F6"/>
    <!-- Smile (man) -->
    <path d="M24 28 Q28 32 32 28" stroke="#222" strokeWidth="2" fill="none"/>
  </g>
</svg> 