<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - E-commerce</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="login-section">
      <div class="login-card">
        <div class="logo">Logo Here</div>
        <p class="welcome">Welcome back !!!</p>
        <h2>Sign in</h2>
        <form>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="user@email.com" required>
          <div class="password-row">
            <label for="password">Password</label>
            <a href="#" class="forgot">Forgot Password?</a>
          </div>
          <input type="password" id="password" name="password" placeholder="********" required>
          <button type="submit" class="signin-btn">SIGN IN</button>
        </form>
        <p class="signup-link">I don't have an account? <a href="#">Sign up</a></p>
      </div>
    </div>
    <div class="illustration-section">
      <div class="illustration-placeholder">
        <!-- You can replace this SVG with your own illustration -->
        <svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="40" y="120" width="120" height="60" rx="10" fill="#F6F6F6"/>
          <circle cx="160" cy="150" r="20" fill="#FF725E"/>
          <rect x="60" y="140" width="60" height="30" rx="5" fill="#00E0C6"/>
          <rect x="130" y="140" width="30" height="30" rx="5" fill="#3B82F6"/>
          <rect x="100" y="100" width="20" height="40" rx="5" fill="#FFB085"/>
          <ellipse cx="110" cy="90" rx="18" ry="18" fill="#FFB085"/>
        </svg>
        <div class="person-placeholder"></div>
      </div>
    </div>
  </div>
</body>
</html>
